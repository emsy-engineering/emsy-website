<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emsy Engineering AB</title>
    <meta name="description" content="Emsy Engineering AB – Engineering consultancy. Find us on LinkedIn.">
    <meta http-equiv="refresh" content="5;url=https://se.linkedin.com/company/emsy-engineering-ab">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #141e2b;
            --bg-mid: #1b2838;
            --text-primary: #e8ecf1;
            --text-secondary: #8a9bb5;
            --accent: #5b8abf;
            --accent-glow: rgba(91, 138, 191, 0.15);
        }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(30, 50, 80, 0.6), transparent),
                radial-gradient(circle at 20% 80%, rgba(91, 138, 191, 0.08), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(60, 100, 150, 0.06), transparent 40%);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(91, 138, 191, 0.07), transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(40, 70, 120, 0.06), transparent 50%);
            animation: ambientShift 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes ambientShift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, 3%) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            animation: fadeUp 0.8s ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            width: 140px;
            height: 140px;
            margin: 0 auto 2.5rem;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.04);
            animation: fadeUp 0.8s ease-out 0.1s both;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 0.04em;
            margin-bottom: 1rem;
            animation: fadeUp 0.8s ease-out 0.2s both;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 2.5rem;
            animation: fadeUp 0.8s ease-out 0.3s both;
        }

        .redirect-section {
            animation: fadeUp 0.8s ease-out 0.4s both;
        }

        .progress-track {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            margin: 0 auto 1.2rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #7eadd4);
            border-radius: 2px;
            animation: progressFill 5s linear 0.6s forwards;
        }

        @keyframes progressFill {
            to { width: 100%; }
        }

        .redirect-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
            margin-bottom: 0.6rem;
        }

        .linkedin-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            background: var(--accent-glow);
            border: 1px solid rgba(91, 138, 191, 0.15);
            transition: all 0.25s ease;
        }

        .linkedin-link:hover {
            background: rgba(91, 138, 191, 0.25);
            border-color: rgba(91, 138, 191, 0.3);
            transform: translateY(-1px);
        }

        .linkedin-link svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(91, 138, 191, 0.2);
            border-radius: 50%;
            animation: drift linear infinite;
            pointer-events: none;
        }

        .particle:nth-child(1) { left: 15%; top: 20%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 75%; top: 60%; animation-duration: 22s; animation-delay: 3s; }
        .particle:nth-child(3) { left: 40%; top: 80%; animation-duration: 20s; animation-delay: 6s; }
        .particle:nth-child(4) { left: 85%; top: 25%; animation-duration: 25s; animation-delay: 2s; }
        .particle:nth-child(5) { left: 55%; top: 10%; animation-duration: 16s; animation-delay: 4s; }

        @keyframes drift {
            0% { opacity: 0; transform: translateY(0) translateX(0); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) translateX(30px); }
        }

        @media (max-width: 480px) {
            .logo-wrap { width: 110px; height: 110px; border-radius: 20px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="logo-wrap">
            <img src="emsy-logo.png" alt="Emsy Engineering AB">
        </div>

        <h1>Emsy Engineering AB</h1>

        <p class="tagline">
            We're on LinkedIn –<br>
            redirecting you shortly.
        </p>

        <div class="redirect-section">
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
            <a href="https://se.linkedin.com/company/emsy-engineering-ab" class="linkedin-link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
                Visit us on LinkedIn
            </a>
        </div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = 'https://se.linkedin.com/company/emsy-engineering-ab';
        }, 5200);
    </script>
</body>
</html>
